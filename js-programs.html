<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Programs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px;
      background: #fff;
      color: #111;
    }
    h1 {
      font-size: 22px;
      border-bottom: 2px solid #111;
      padding-bottom: 8px;
      margin-bottom: 30px;
    }
    .program {
      margin-bottom: 36px;
    }
    .program-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f0f0f0;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-bottom: none;
    }
    .program-title {
      font-weight: bold;
      font-size: 14px;
    }
    .copy-btn {
      font-size: 12px;
      padding: 4px 12px;
      cursor: pointer;
      background: #fff;
      border: 1px solid #999;
    }
    .copy-btn:hover {
      background: #e8e8e8;
    }
    pre {
      background: #f9f9f9;
      border: 1px solid #ccc;
      padding: 16px;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: auto;
      margin: 0;
      font-family: "Courier New", monospace;
      white-space: pre;
    }
  </style>
</head>
<body>

<h1>JavaScript Programs</h1>
<div id="container"></div>

<script>
const programs = [
  {
    title: "1. Perfect / Abundant / Deficient Number",
    code:
`<html>
<body>
<script>
let num = parseInt(prompt("Enter a number:"));
let sum = 0;
for (let i = 1; i <= num / 2; i++) {
  if (num % i === 0) sum += i;
}
if (sum === num) {
  alert("Perfect Number");
} else if (sum > num) {
  alert("Abundant Number");
} else {
  alert("Deficient Number");
}
<\/script>
</body>
</html>`
  },
  {
    title: "2. Multiplication Table",
    code:
`<html>
<body>
<input type="number" id="num" placeholder="Number">
<input type="number" id="limit" placeholder="Limit">
<div id="result"></div>
<button onclick="table()">Show Table</button>
<script>
function table() {
  let n = parseInt(document.getElementById("num").value);
  let l = parseInt(document.getElementById("limit").value);
  let out = "";
  for (let i = 1; i <= l; i++) {
    out += n + " x " + i + " = " + (n * i) + "<br>";
  }
  document.getElementById("result").innerHTML = out;
}
<\/script>
</body>
</html>`
  },
  {
    title: "3. Background Color Changer",
    code:
`<html>
<body>
<button onclick="changeColor()">Change Background</button>
<script>
let colors = ["red", "green", "blue", "yellow", "pink"];
let i = 0;
function changeColor() {
  document.body.style.backgroundColor = colors[i];
  i = (i + 1) % colors.length;
}
<\/script>
</body>
</html>`
  },
  {
    title: "4. Focus and Blur Input Styling",
    code:
`<html>
<body>
<input type="text"
  onfocus="focusFun(this)"
  onblur="blurFun(this)"
  placeholder="Enter text">
<script>
function focusFun(x) {
  x.style.background = "yellow";
  x.style.color = "red";
}
function blurFun(x) {
  x.style.background = "white";
  x.style.color = "black";
}
<\/script>
</body>
</html>`
  },
  {
    title: "5. Show Current Date and Time",
    code:
`<html>
<body>
<button onclick="showDate()">Show Date & Time</button>
<p id="dt"></p>
<script>
function showDate() {
  let now = new Date();
  document.getElementById("dt").innerHTML = now;
}
<\/script>
</body>
</html>`
  },
  {
    title: "6. Number, Square and Cube Table",
    code:
`<!DOCTYPE html>
<html>
<body>
<table border="1">
  <tr>
    <th>Number</th>
    <th>Square</th>
    <th>Cube</th>
  </tr>
  <script>
  for (let i = 0; i <= 10; i++) {
    document.write("<tr>");
    document.write("<td>" + i + "</td>");
    document.write("<td>" + (i * i) + "</td>");
    document.write("<td>" + (i * i * i) + "</td>");
    document.write("</tr>");
  }
  <\/script>
</table>
</body>
</html>`
  },
  {
    title: "7. Form Validation",
    code:
`<!-- index.html -->
<html>
<body>
<form onsubmit="return validate()">
  Name: <input type="text" id="name"><br>
  Email: <input type="text" id="email"><br>
  Age: <input type="number" id="age"><br>
  <button type="submit">Submit</button>
</form>
<script src="validate.js"><\/script>
</body>
</html>

<!-- validate.js -->
function validate() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let age = document.getElementById("age").value;
  if (name === "") {
    alert("Name required");
    return false;
  }
  if (!email.includes("@")) {
    alert("Invalid Email");
    return false;
  }
  if (age < 18) {
    alert("Age must be 18+");
    return false;
  }
  alert("Form submitted successfully");
  return true;
}`
  },
  {
    title: "8. Basic Calculator",
    code:
`<html>
<body>
<input id="a" type="number">
<input id="b" type="number"><br>
<button onclick="calc('+')">+</button>
<button onclick="calc('-')">-</button>
<button onclick="calc('*')">*</button>
<button onclick="calc('/')">/</button>
<p id="res"></p>
<script>
function calc(op) {
  let x = parseFloat(a.value);
  let y = parseFloat(b.value);
  let r;
  if (op === '+') r = x + y;
  if (op === '-') r = x - y;
  if (op === '*') r = x * y;
  if (op === '/') r = x / y;
  res.innerHTML = "Result: " + r;
}
<\/script>
</body>
</html>`
  },
  {
    title: "9. Factorial Calculator",
    code:
`<html>
<body>
<input type="number" id="n">
<button onclick="fact()">Factorial</button>
<p id="ans"></p>
<script>
function fact() {
  let num = parseInt(n.value);
  let f = 1;
  for (let i = 1; i <= num; i++) {
    f *= i;
  }
  ans.innerHTML = "Factorial = " + f;
}
<\/script>
</body>
</html>`
  },
  {
    title: "10. IP Address Validator",
    code:
`<html>
<body>
<input type="text" id="ip" placeholder="Enter IP">
<button onclick="checkIP()">Check</button>
<p id="out"></p>
<script>
function checkIP() {
  let ip = document.getElementById("ip").value;
  let regex = /^(\d{1,3}\.){3}\d{1,3}$/;
  if (regex.test(ip)) {
    out.innerHTML = "Valid IP Address";
  } else {
    out.innerHTML = "Invalid IP Address";
  }
}
<\/script>
</body>
</html>`
  }
];

const container = document.getElementById("container");

programs.forEach(function(p, idx) {
  const div = document.createElement("div");
  div.className = "program";
  div.innerHTML =
    '<div class="program-header">' +
      '<span class="program-title">' + p.title + '</span>' +
      '<button class="copy-btn" onclick="copyCode(' + idx + ', this)">Copy</button>' +
    '</div>' +
    '<pre id="code-' + idx + '">' + escapeHtml(p.code) + '</pre>';
  container.appendChild(div);
});

function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function copyCode(idx, btn) {
  navigator.clipboard.writeText(programs[idx].code).then(function() {
    btn.textContent = "Copied";
    setTimeout(function() { btn.textContent = "Copy"; }, 2000);
  });
}
</script>
</body>
</html>
