<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Programs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px;
      background: #fff;
      color: #111;
    }
    h1 {
      font-size: 22px;
      border-bottom: 2px solid #111;
      padding-bottom: 8px;
      margin-bottom: 30px;
    }
    .program {
      margin-bottom: 36px;
    }
    .program-header {
      background: #f0f0f0;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-bottom: none;
      font-weight: bold;
      font-size: 14px;
    }
    .file-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #e8e8e8;
      padding: 5px 12px;
      border: 1px solid #ccc;
      border-bottom: none;
      font-size: 13px;
    }
    .single-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f0f0f0;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-bottom: none;
    }
    .single-title {
      font-weight: bold;
      font-size: 14px;
    }
    .btn-group {
      display: flex;
      gap: 6px;
    }
    .copy-btn, .toggle-btn {
      font-size: 12px;
      padding: 4px 12px;
      cursor: pointer;
      background: #fff;
      border: 1px solid #999;
    }
    .copy-btn:hover, .toggle-btn:hover {
      background: #e0e0e0;
    }
    pre {
      background: #f9f9f9;
      border: 1px solid #ccc;
      padding: 16px;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: auto;
      margin: 0 0 4px 0;
      font-family: "Courier New", monospace;
      white-space: pre;
    }
    .output-frame {
      display: none;
      width: 100%;
      border: 1px solid #ccc;
      border-top: none;
      background: #fff;
      box-sizing: border-box;
    }
    .output-label {
      display: none;
      background: #fff8dc;
      border: 1px solid #ccc;
      border-top: none;
      padding: 4px 12px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>

<h1>JavaScript Programs</h1>
<div id="container"></div>

<script>
const programs = [
  {
    title: "1. Perfect / Abundant / Deficient Number",
    code: "<html>\n<body>\n<script>\nlet num = parseInt(prompt(\"Enter a number:\"));\nlet sum = 0;\nfor (let i = 1; i <= num / 2; i++) {\n  if (num % i === 0) sum += i;\n}\nif (sum === num) {\n  alert(\"Perfect Number\");\n} else if (sum > num) {\n  alert(\"Abundant Number\");\n} else {\n  alert(\"Deficient Number\");\n}\n<\/script>\n</body>\n</html>"
  },
  {
    title: "2. Multiplication Table",
    code: "<html>\n<body>\n<input type=\"number\" id=\"num\" placeholder=\"Number\">\n<input type=\"number\" id=\"limit\" placeholder=\"Limit\">\n<div id=\"result\"></div>\n<button onclick=\"table()\">Show Table</button>\n<script>\nfunction table() {\n  let n = parseInt(document.getElementById(\"num\").value);\n  let l = parseInt(document.getElementById(\"limit\").value);\n  let out = \"\";\n  for (let i = 1; i <= l; i++) {\n    out += n + \" x \" + i + \" = \" + (n * i) + \"<br>\";\n  }\n  document.getElementById(\"result\").innerHTML = out;\n}\n<\/script>\n</body>\n</html>"
  },
  {
    title: "3. Background Color Changer",
    code: "<html>\n<body>\n<button onclick=\"changeColor()\">Change Background</button>\n<script>\nlet colors = [\"red\", \"green\", \"blue\", \"yellow\", \"pink\"];\nlet i = 0;\nfunction changeColor() {\n  document.body.style.backgroundColor = colors[i];\n  i = (i + 1) % colors.length;\n}\n<\/script>\n</body>\n</html>"
  },
  {
    title: "4. Focus and Blur Input Styling",
    code: "<html>\n<body>\n<input type=\"text\"\n  onfocus=\"focusFun(this)\"\n  onblur=\"blurFun(this)\"\n  placeholder=\"Enter text\">\n<script>\nfunction focusFun(x) {\n  x.style.background = \"yellow\";\n  x.style.color = \"red\";\n}\nfunction blurFun(x) {\n  x.style.background = \"white\";\n  x.style.color = \"black\";\n}\n<\/script>\n</body>\n</html>"
  },
  {
    title: "5. Show Current Date and Time",
    code: "<html>\n<body>\n<button onclick=\"showDate()\">Show Date & Time</button>\n<p id=\"dt\"></p>\n<script>\nfunction showDate() {\n  let now = new Date();\n  document.getElementById(\"dt\").innerHTML = now;\n}\n<\/script>\n</body>\n</html>"
  },
  {
    title: "6. Number, Square and Cube Table",
    code: "<!DOCTYPE html>\n<html>\n<body>\n<table border=\"1\">\n  <tr>\n    <th>Number</th>\n    <th>Square</th>\n    <th>Cube</th>\n  </tr>\n  <script>\n  for (let i = 0; i <= 10; i++) {\n    document.write(\"<tr>\");\n    document.write(\"<td>\" + i + \"</td>\");\n    document.write(\"<td>\" + (i * i) + \"</td>\");\n    document.write(\"<td>\" + (i * i * i) + \"</td>\");\n    document.write(\"</tr>\");\n  }\n  <\/script>\n</table>\n</body>\n</html>"
  },
  {
    title: "7. Form Validation",
    files: [
      {
        filename: "index.html",
        code: "<html>\n<body>\n<form onsubmit=\"return validate()\">\n  Name: <input type=\"text\" id=\"name\"><br>\n  Email: <input type=\"text\" id=\"email\"><br>\n  Age: <input type=\"number\" id=\"age\"><br>\n  <button type=\"submit\">Submit</button>\n</form>\n<script src=\"validate.js\"><\/script>\n</body>\n</html>"
      },
      {
        filename: "validate.js",
        code: "function validate() {\n  let name = document.getElementById(\"name\").value;\n  let email = document.getElementById(\"email\").value;\n  let age = document.getElementById(\"age\").value;\n  if (name === \"\") {\n    alert(\"Name required\");\n    return false;\n  }\n  if (!email.includes(\"@\")) {\n    alert(\"Invalid Email\");\n    return false;\n  }\n  if (age < 18) {\n    alert(\"Age must be 18+\");\n    return false;\n  }\n  alert(\"Form submitted successfully\");\n  return true;\n}"
      }
    ],
    preview: "<html>\n<body>\n<form onsubmit=\"return validate()\">\n  Name: <input type=\"text\" id=\"name\"><br>\n  Email: <input type=\"text\" id=\"email\"><br>\n  Age: <input type=\"number\" id=\"age\"><br>\n  <button type=\"submit\">Submit</button>\n</form>\n<script>\nfunction validate() {\n  let name = document.getElementById(\"name\").value;\n  let email = document.getElementById(\"email\").value;\n  let age = document.getElementById(\"age\").value;\n  if (name === \"\") { alert(\"Name required\"); return false; }\n  if (!email.includes(\"@\")) { alert(\"Invalid Email\"); return false; }\n  if (age < 18) { alert(\"Age must be 18+\"); return false; }\n  alert(\"Form submitted successfully\");\n  return true;\n}\n<\/script>\n</body>\n</html>"
  },
  {
    title: "8. Basic Calculator",
    code: "<html>\n<body>\n<input id=\"a\" type=\"number\">\n<input id=\"b\" type=\"number\"><br>\n<button onclick=\"calc('+')\">+</button>\n<button onclick=\"calc('-')\">-</button>\n<button onclick=\"calc('*')\">*</button>\n<button onclick=\"calc('/')\">\/</button>\n<p id=\"res\"></p>\n<script>\nfunction calc(op) {\n  let x = parseFloat(a.value);\n  let y = parseFloat(b.value);\n  let r;\n  if (op === '+') r = x + y;\n  if (op === '-') r = x - y;\n  if (op === '*') r = x * y;\n  if (op === '/') r = x / y;\n  res.innerHTML = \"Result: \" + r;\n}\n<\/script>\n</body>\n</html>"
  },
  {
    title: "9. Factorial Calculator",
    code: "<html>\n<body>\n<input type=\"number\" id=\"n\">\n<button onclick=\"fact()\">Factorial</button>\n<p id=\"ans\"></p>\n<script>\nfunction fact() {\n  let num = parseInt(n.value);\n  let f = 1;\n  for (let i = 1; i <= num; i++) {\n    f *= i;\n  }\n  ans.innerHTML = \"Factorial = \" + f;\n}\n<\/script>\n</body>\n</html>"
  },
  {
    title: "10. IP Address Validator",
    code: "<html>\n<body>\n<input type=\"text\" id=\"ip\" placeholder=\"Enter IP\">\n<button onclick=\"checkIP()\">Check</button>\n<p id=\"out\"></p>\n<script>\nfunction checkIP() {\n  let ip = document.getElementById(\"ip\").value;\n  let regex = /^(\\d{1,3}\\.){3}\\d{1,3}$/;\n  if (regex.test(ip)) {\n    out.innerHTML = \"Valid IP Address\";\n  } else {\n    out.innerHTML = \"Invalid IP Address\";\n  }\n}\n<\/script>\n</body>\n</html>"
  }
];

const container = document.getElementById("container");

programs.forEach(function(p, idx) {
  const div = document.createElement("div");
  div.className = "program";

  const previewCode = p.preview || p.code;

  if (p.files) {
    let html = '<div class="program-header">' + p.title + '</div>';
    p.files.forEach(function(f, fi) {
      html +=
        '<div class="file-header">' +
          '<span>' + f.filename + '</span>' +
          '<button class="copy-btn" onclick="copyText(\'' + idx + '_' + fi + '\', this)">Copy</button>' +
        '</div>' +
        '<pre>' + escapeHtml(f.code) + '</pre>';
    });
    html +=
      '<div class="output-label" id="label-' + idx + '">Output Preview</div>' +
      '<iframe class="output-frame" id="frame-' + idx + '" sandbox="allow-scripts allow-modals" height="160"></iframe>' +
      '<div style="border:1px solid #ccc;border-top:none;padding:6px 12px;background:#f0f0f0;">' +
        '<button class="toggle-btn" onclick="toggleOutput(' + idx + ', this)">Show Output</button>' +
      '</div>';
    div.innerHTML = html;
  } else {
    div.innerHTML =
      '<div class="single-header">' +
        '<span class="single-title">' + p.title + '</span>' +
        '<div class="btn-group">' +
          '<button class="copy-btn" onclick="copyText(\'' + idx + '\', this)">Copy</button>' +
          '<button class="toggle-btn" onclick="toggleOutput(' + idx + ', this)">Show Output</button>' +
        '</div>' +
      '</div>' +
      '<pre>' + escapeHtml(p.code) + '</pre>' +
      '<div class="output-label" id="label-' + idx + '">Output Preview</div>' +
      '<iframe class="output-frame" id="frame-' + idx + '" sandbox="allow-scripts allow-modals" height="160"></iframe>';
  }

  container.appendChild(div);
});

const codeMap = {};
const previewMap = {};
programs.forEach(function(p, idx) {
  if (p.files) {
    p.files.forEach(function(f, fi) {
      codeMap[idx + '_' + fi] = f.code;
    });
    previewMap[idx] = p.preview;
  } else {
    codeMap[idx] = p.code;
    previewMap[idx] = p.code;
  }
});

function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function copyText(key, btn) {
  navigator.clipboard.writeText(codeMap[key]).then(function() {
    btn.textContent = "Copied";
    setTimeout(function() { btn.textContent = "Copy"; }, 2000);
  });
}

function toggleOutput(idx, btn) {
  const frame = document.getElementById("frame-" + idx);
  const label = document.getElementById("label-" + idx);
  const visible = frame.style.display === "block";
  if (visible) {
    frame.style.display = "none";
    label.style.display = "none";
    frame.srcdoc = "";
    btn.textContent = "Show Output";
  } else {
    frame.style.display = "block";
    label.style.display = "block";
    frame.srcdoc = previewMap[idx];
    btn.textContent = "Hide Output";
  }
}
</script>
</body>
</html>
